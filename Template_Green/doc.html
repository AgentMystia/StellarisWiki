</p>
<h2><span class="mw-headline" id="Usage">Usage</span></h2>
<p> {{green|green text}} gives <span class="effect-green" style="font-weight:bold;">green text</span>
</p><p> {{green|green text|bg=yes}} gives <span class="effect-green effect-background-green" style="font-weight:bold;">green text</span>
</p>
