<div class="mw-parser-output"><p>Makes text bold and red, as the game uses for negative effects.
</p>
<h2><span class="mw-headline" id="Usage">Usage</span></h2>
<p> {{red|red text}} gives <span class="effect-red" style="font-weight:bold;">red text</span>
</p><p> {{red|text you want red|bg=yes}} gives <span class="effect-red effect-background-red" style="font-weight:bold;">red text</span>
</p>
